name: finalcial_records
description: A new Flutter project.

publish_to: "none" # Remove this line if you wish to publish to pub.dev

environment:
  sdk: ">=3.0.5 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  intl: ^0.20.2
  google_fonts: ^8.0.2
  shared_preferences: ^2.1.2
  uuid: ^4.5.3
  flutter_spinkit: ^5.2.0
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon_blue.png
  adaptive_icon_background: "#EAF8FF"
  adaptive_icon_foreground: assets/app_icon_blue.png

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/
